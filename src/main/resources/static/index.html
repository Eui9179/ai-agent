<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RAG Chat</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f5;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    header {
      background: #fff;
      border-bottom: 1px solid #e5e5e5;
      padding: 0 24px;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    header h1 { font-size: 16px; font-weight: 600; color: #111; }

    /* ── Upload toggle button ── */
    #upload-toggle {
      font-size: 13px;
      padding: 6px 14px;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      background: #fff;
      cursor: pointer;
      color: #374151;
      transition: background 0.15s;
    }
    #upload-toggle:hover { background: #f3f4f6; }

    /* ── Upload panel ── */
    #upload-panel {
      background: #fff;
      border-bottom: 1px solid #e5e5e5;
      padding: 16px 24px;
      display: none;
      flex-shrink: 0;
    }
    #upload-panel.open { display: block; }

    .upload-form {
      display: flex;
      gap: 12px;
      align-items: flex-end;
      flex-wrap: wrap;
    }
    .upload-form .field { display: flex; flex-direction: column; gap: 4px; }
    .upload-form label { font-size: 11px; font-weight: 500; color: #6b7280; text-transform: uppercase; letter-spacing: 0.05em; }
    .upload-form input[type="text"],
    .upload-form input[type="file"] {
      height: 36px;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      padding: 0 10px;
      font-size: 13px;
      color: #111;
      outline: none;
    }
    .upload-form input[type="file"] { padding: 4px 8px; }
    .upload-form input:focus { border-color: #6366f1; box-shadow: 0 0 0 2px rgba(99,102,241,0.15); }

    #upload-btn {
      height: 36px;
      padding: 0 18px;
      background: #6366f1;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      white-space: nowrap;
    }
    #upload-btn:hover { background: #4f46e5; }
    #upload-btn:disabled { background: #a5b4fc; cursor: not-allowed; }

    #upload-status {
      font-size: 13px;
      margin-top: 8px;
      min-height: 18px;
      color: #6b7280;
    }
    #upload-status.success { color: #16a34a; }
    #upload-status.error { color: #dc2626; }

    /* ── Chat area ── */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .msg {
      max-width: 720px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .msg.user { align-self: flex-end; align-items: flex-end; }
    .msg.assistant { align-self: flex-start; align-items: flex-start; }

    .msg-label {
      font-size: 11px;
      font-weight: 500;
      color: #9ca3af;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .msg-bubble {
      padding: 12px 16px;
      border-radius: 12px;
      font-size: 14px;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .msg.user .msg-bubble {
      background: #6366f1;
      color: #fff;
      border-bottom-right-radius: 4px;
    }
    .msg.assistant .msg-bubble {
      background: #fff;
      color: #111;
      border: 1px solid #e5e5e5;
      border-bottom-left-radius: 4px;
    }

    /* sources */
    .msg-sources {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 6px;
    }
    .source-tag {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      padding: 3px 8px;
      background: #f0f0ff;
      border: 1px solid #c7d2fe;
      border-radius: 99px;
      color: #4338ca;
    }
    .source-tag a {
      display: inline-flex;
      align-items: center;
      color: #4338ca;
      opacity: 0.6;
      transition: opacity 0.15s;
      text-decoration: none;
    }
    .source-tag a:hover { opacity: 1; }
    .source-tag a svg { width: 11px; height: 11px; }

    /* thinking indicator */
    .thinking .msg-bubble {
      color: #9ca3af;
      font-style: italic;
    }
    .dot-flashing {
      display: inline-flex;
      gap: 4px;
      align-items: center;
    }
    .dot-flashing span {
      width: 6px; height: 6px;
      background: #d1d5db;
      border-radius: 50%;
      animation: blink 1.2s infinite;
    }
    .dot-flashing span:nth-child(2) { animation-delay: 0.2s; }
    .dot-flashing span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes blink { 0%,80%,100% { opacity: 0.2; } 40% { opacity: 1; } }

    /* empty state */
    #empty {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      color: #9ca3af;
    }
    #empty .icon { font-size: 40px; }
    #empty p { font-size: 14px; }

    /* ── Input bar ── */
    #input-bar {
      background: #fff;
      border-top: 1px solid #e5e5e5;
      padding: 16px 24px;
      display: flex;
      gap: 10px;
      align-items: flex-end;
      flex-shrink: 0;
    }

    #message-input {
      flex: 1;
      min-height: 40px;
      max-height: 160px;
      padding: 10px 14px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      font-size: 14px;
      font-family: inherit;
      line-height: 1.5;
      resize: none;
      outline: none;
      overflow-y: auto;
    }
    #message-input:focus { border-color: #6366f1; box-shadow: 0 0 0 2px rgba(99,102,241,0.15); }

    #send-btn {
      width: 40px; height: 40px;
      background: #6366f1;
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s;
    }
    #send-btn:hover { background: #4f46e5; }
    #send-btn:disabled { background: #a5b4fc; cursor: not-allowed; }
    #send-btn svg { width: 18px; height: 18px; }
  </style>
</head>
<body>

<header>
  <h1>RAG Chat</h1>
  <button id="upload-toggle">+ 문서 업로드</button>
</header>

<!-- PDF upload panel -->
<div id="upload-panel">
  <div class="upload-form">
    <div class="field">
      <label>PDF 파일</label>
      <input type="file" id="file-input" accept=".pdf" />
    </div>
    <div class="field">
      <label>파일 이름</label>
      <input type="text" id="file-name" placeholder="인사규정_2024" style="width:160px" />
    </div>
    <div class="field">
      <label>클라이언트</label>
      <input type="text" id="client" placeholder="acme" style="width:120px" />
    </div>
    <div class="field">
      <label>파일 ID</label>
      <input type="text" id="file-id" placeholder="doc-001" style="width:120px" />
    </div>
    <button id="upload-btn">업로드</button>
  </div>
  <div id="upload-status"></div>
</div>

<!-- Chat messages -->
<div id="messages">
  <div id="empty">
    <div class="icon">💬</div>
    <p>문서를 업로드하고 질문해보세요.</p>
  </div>
</div>

<!-- Input bar -->
<div id="input-bar">
  <textarea id="message-input" placeholder="질문을 입력하세요..." rows="1"></textarea>
  <button id="send-btn" title="전송">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <line x1="22" y1="2" x2="11" y2="13"></line>
      <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
    </svg>
  </button>
</div>

<script>
  const API_BASE = '';

  // ── Upload panel toggle ──
  const uploadToggle = document.getElementById('upload-toggle');
  const uploadPanel  = document.getElementById('upload-panel');
  uploadToggle.addEventListener('click', () => {
    uploadPanel.classList.toggle('open');
    uploadToggle.textContent = uploadPanel.classList.contains('open') ? '✕ 닫기' : '+ 문서 업로드';
  });

  // ── Upload ──
  document.getElementById('upload-btn').addEventListener('click', async () => {
    const fileInput = document.getElementById('file-input');
    const fileName  = document.getElementById('file-name').value.trim();
    const client    = document.getElementById('client').value.trim();
    const fileId    = document.getElementById('file-id').value.trim();
    const status    = document.getElementById('upload-status');
    const btn       = document.getElementById('upload-btn');

    if (!fileInput.files[0]) { setStatus(status, 'error', 'PDF 파일을 선택해주세요.'); return; }
    if (!fileName)            { setStatus(status, 'error', '파일 이름을 입력해주세요.'); return; }
    if (!client)              { setStatus(status, 'error', '클라이언트를 입력해주세요.'); return; }
    if (!fileId)              { setStatus(status, 'error', '파일 ID를 입력해주세요.'); return; }

    const form = new FormData();
    form.append('file',     fileInput.files[0]);
    form.append('fileName', fileName);
    form.append('client',   client);
    form.append('fileId',   fileId);

    btn.disabled = true;
    setStatus(status, '', '업로드 중...');

    try {
      const res  = await fetch(`${API_BASE}/v1/api/documents/ingest`, { method: 'POST', body: form });
      if (!res.ok) throw new Error(`서버 오류 (${res.status})`);
      const data = await res.json();
      setStatus(status, 'success', `✓ "${data.fileName}" 업로드 완료 — ${data.chunkCount}개 청크 저장됨`);
    } catch (e) {
      setStatus(status, 'error', `업로드 실패: ${e.message}`);
    } finally {
      btn.disabled = false;
    }
  });

  function setStatus(el, cls, msg) {
    el.className = cls ? `${cls}` : '';
    el.textContent = msg;
  }

  // ── Chat ──
  const messagesEl = document.getElementById('messages');
  const inputEl    = document.getElementById('message-input');
  const sendBtn    = document.getElementById('send-btn');

  // auto-resize textarea
  inputEl.addEventListener('input', () => {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 160) + 'px';
  });

  // send on Enter (Shift+Enter = newline)
  inputEl.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });
  sendBtn.addEventListener('click', sendMessage);

  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text || sendBtn.disabled) return;

    clearEmpty();
    appendMessage('user', text);
    inputEl.value = '';
    inputEl.style.height = 'auto';

    sendBtn.disabled = true;
    const thinkingEl = appendThinking();

    try {
      const res = await fetch(`${API_BASE}/v1/api/chat`, {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ message: text }),
      });
      if (!res.ok) throw new Error(`서버 오류 (${res.status})`);
      const data = await res.json();
      thinkingEl.remove();
      appendMessage('assistant', data.answer, data.sources);
    } catch (e) {
      thinkingEl.remove();
      appendMessage('assistant', `오류가 발생했습니다: ${e.message}`);
    } finally {
      sendBtn.disabled = false;
      inputEl.focus();
    }
  }

  function clearEmpty() {
    const empty = document.getElementById('empty');
    if (empty) empty.remove();
  }

  function appendMessage(role, text, sources) {
    const div = document.createElement('div');
    div.className = `msg ${role}`;

    let sourcesHtml = '';
    if (sources && sources.length > 0) {
      const tags = sources
        .map(s => {
          const downloadUrl = `/v1/api/documents/${encodeURIComponent(s.fileId)}/download`;
          return `<span class="source-tag">
            📄 ${escapeHtml(s.fileName)} p.${s.page}
            <a href="${downloadUrl}" download title="PDF 다운로드">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
              </svg>
            </a>
          </span>`;
        })
        .join('');
      sourcesHtml = `<div class="msg-sources">${tags}</div>`;
    }

    div.innerHTML = `
      <span class="msg-label">${role === 'user' ? '나' : 'AI'}</span>
      <div class="msg-bubble">${escapeHtml(text)}</div>
      ${sourcesHtml}
    `;
    messagesEl.appendChild(div);
    scrollToBottom();
    return div;
  }

  function appendThinking() {
    const div = document.createElement('div');
    div.className = 'msg assistant thinking';
    div.innerHTML = `
      <span class="msg-label">AI</span>
      <div class="msg-bubble">
        <div class="dot-flashing"><span></span><span></span><span></span></div>
      </div>
    `;
    messagesEl.appendChild(div);
    scrollToBottom();
    return div;
  }

  function scrollToBottom() {
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function escapeHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
</script>
</body>
</html>
