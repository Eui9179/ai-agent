server.port=8090

spring.profiles.active=secret

# LLM Model
spring.ai.ollama.chat.options.model=llama3.2

# Embedding Model (BAAI/bge-m3)
spring.ai.ollama.embedding.options.model=bge-m3

# ===== Qdrant Vector Store =====
spring.ai.vectorstore.qdrant.port=6334
spring.ai.vectorstore.qdrant.collection-name=rag
spring.ai.vectorstore.qdrant.use-tls=false
spring.ai.vectorstore.qdrant.initialize-schema=true

# ===== Document Chunking (LangChain4j) =====
rag.chunking.chunk-size=500
rag.chunking.chunk-overlap=50
