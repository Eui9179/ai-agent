server.port=8090

spring.profiles.active=secret

# ===== Ollama (langchain4j-ollama-spring-boot-starter) =====
langchain4j.ollama.chat-model.model-name=llama3.2
langchain4j.ollama.embedding-model.model-name=bge-m3
# langchain4j.ollama.chat-model.base-url → application-secret.properties
# langchain4j.ollama.embedding-model.base-url → application-secret.properties

# ===== Qdrant =====
qdrant.port=6334
qdrant.collection-name=ADMIN
# qdrant.host → application-secret.properties

# ===== Document Chunking (LangChain4j) =====
rag.chunking.chunk-size=500
rag.chunking.chunk-overlap=50

# ===== File Upload Storage =====
upload.dir=./uploads
